name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup bun
        uses: oven-sh/setup-bun@735343b2673b12f3cdc9c9a1bd22de6c71fc0018 # v2.0.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

  lint:
    name: Lint & Format
    needs: install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup bun
        uses: oven-sh/setup-bun@735343b2673b12f3cdc9c9a1bd22de6c71fc0018 # v2.0.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (oxc)
        run: bun lint

      - name: Format check (oxc)
        run: bun format:check

  test:
    name: Test
    needs: install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup bun
        uses: oven-sh/setup-bun@735343b2673b12f3cdc9c9a1bd22de6c71fc0018 # v2.0.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup bun
        uses: oven-sh/setup-bun@735343b2673b12f3cdc9c9a1bd22de6c71fc0018 # v2.0.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  e2e:
    name: E2E Tests
    needs: install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup bun
        uses: oven-sh/setup-bun@735343b2673b12f3cdc9c9a1bd22de6c71fc0018 # v2.0.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: E2E tests
        run: bun run e2e
